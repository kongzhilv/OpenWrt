name: Build OpenWrt Minimal F50 WiFi SFTP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - fix-rax3000m-emmc-target
    paths-ignore:
      - "*.md"
      - "LICENSE"

permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: v25.12.1
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: "true"
  UPLOAD_RELEASE: "true"
  TZ: Asia/Shanghai
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    name: build-minimal-f50-wifi-sftp
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f "$CONFIG_FILE"
          test -f "$DIY_P1_SH"
          test -f "$DIY_P2_SH"

      - name: Prepare folders
        run: |
          mkdir -p logs release-files

      - name: Init build environment
        run: |
          {
            echo "===== Init build environment ====="
            date

            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
            sudo docker image prune --all --force || true

            sudo apt-get update
            sudo apt-get -y install \
              build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
              gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip \
              zlib1g-dev file wget curl swig python3-dev qemu-utils libfuse-dev

            sudo timedatectl set-timezone "$TZ" || true
            df -h
          } 2>&1 | tee logs/01_init_env.log

      - name: Clone OpenWrt source
        run: |
          {
            echo "===== Clone OpenWrt source ====="
            date
            git clone -b "$REPO_BRANCH" --depth 1 "$REPO_URL" openwrt
            cd openwrt
            git log -1 --oneline
          } 2>&1 | tee logs/02_clone_source.log

      - name: DIY part 1
        run: |
          {
            echo "===== DIY part1 ====="
            date
            chmod +x "$DIY_P1_SH"
            cd openwrt
            "$GITHUB_WORKSPACE/$DIY_P1_SH"
          } 2>&1 | tee logs/03_diy_part1.log

      - name: Update feeds
        run: |
          {
            echo "===== Update feeds ====="
            date
            cd openwrt
            ./scripts/feeds update -a
          } 2>&1 | tee logs/04_feeds_update.log

      - name: Install feeds
        run: |
          {
            echo "===== Install feeds ====="
            date
            cd openwrt
            ./scripts/feeds install -a
          } 2>&1 | tee logs/05_feeds_install.log

      - name: DIY part 2 and defconfig
        run: |
          {
            echo "===== DIY part2 + defconfig ====="
            date

            chmod +x "$DIY_P2_SH"
            cp -f "$GITHUB_WORKSPACE/$CONFIG_FILE" openwrt/.config

            cd openwrt
            "$GITHUB_WORKSPACE/$DIY_P2_SH"

            make defconfig

            cp -f .config "$GITHUB_WORKSPACE/logs/06_final.config"
          } 2>&1 | tee logs/06_diy_part2_and_defconfig.log

      - name: Validate minimal F50 WiFi SFTP config
        run: |
          {
            echo "===== Validate final config ====="
            date
            cd openwrt

            echo "===== Target ====="
            grep -E '^CONFIG_TARGET_.*=y|^CONFIG_TARGET_(BOARD|SUBTARGET|PROFILE)=' .config || true

            grep -q '^CONFIG_TARGET_mediatek=y' .config
            grep -q '^CONFIG_TARGET_mediatek_filogic=y' .config
            grep -q '^CONFIG_TARGET_mediatek_filogic_DEVICE_cmcc_rax3000m=y' .config

            echo "===== Required LuCI package ====="
            grep -q '^CONFIG_PACKAGE_luci=y' .config

            echo "===== Required SFTP package ====="
            grep -q '^CONFIG_PACKAGE_openssh-sftp-server=y' .config

            echo "===== Required WiFi packages ====="
            grep -q '^CONFIG_PACKAGE_kmod-mt76=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-mt7915e=y' .config
            grep -q '^CONFIG_PACKAGE_wpad-basic-mbedtls=y' .config
            grep -q '^CONFIG_PACKAGE_wireless-regdb=y' .config

            echo "===== Embedded WiFi uci-defaults ====="
            test -f files/etc/uci-defaults/01-enable-wifi
            grep -q 'wifi config' files/etc/uci-defaults/01-enable-wifi
            grep -q 'OpenWrt_2G' files/etc/uci-defaults/01-enable-wifi
            grep -q 'OpenWrt_5G' files/etc/uci-defaults/01-enable-wifi

            echo "===== Required F50 USB packages ====="
            grep -q '^CONFIG_PACKAGE_usbutils=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-net=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-net-cdc-ether=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-net-rndis=y' .config

            echo "===== Optional CDC packages ====="
            grep -E '^CONFIG_PACKAGE_kmod-usb-net-cdc-(ncm|eem|subset)=y' .config || true

            echo "===== Make sure custom stack is not enabled ====="
            ! grep -q '^CONFIG_PACKAGE_luci-app-openclash=y' .config
            ! grep -q '^CONFIG_PACKAGE_openlist=y' .config
            ! grep -q '^CONFIG_PACKAGE_luci-app-openlist=y' .config
            ! grep -q '^CONFIG_PACKAGE_luci-app-diskman=y' .config
            ! grep -q '^CONFIG_PACKAGE_luci-app-turboacc=y' .config
            ! grep -q '^CONFIG_PACKAGE_dockerd=y' .config
            ! grep -q '^CONFIG_PACKAGE_docker-compose=y' .config
            ! grep -q '^CONFIG_PACKAGE_block-mount=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-usb-storage=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-usb-storage-uas=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-usb-net-cdc-mbim=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-usb-wdm=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-usb-serial=y' .config
            ! grep -q '^CONFIG_PACKAGE_usb-modeswitch=y' .config
            ! grep -q '^CONFIG_PACKAGE_usbmuxd=y' .config

            echo "===== Make sure only WiFi embedded script exists ====="
            find files -type f | sort

            bad_files="$(find files -type f | sort | grep -v '^files/etc/uci-defaults/01-enable-wifi$' || true)"
            if [ -n "$bad_files" ]; then
              echo "ERROR: unexpected embedded files:"
              echo "$bad_files"
              exit 1
            fi

            echo "Minimal F50 WiFi SFTP config validation passed."
          } 2>&1 | tee logs/07_validate_config.log

      - name: Download sources
        run: |
          {
            echo "===== Download sources ====="
            date
            cd openwrt
            make download -j8 V=s
          } 2>&1 | tee logs/08_download.log

      - name: Build OpenWrt
        run: |
          {
            echo "===== Build OpenWrt ====="
            date
            cd openwrt
            make -j"$(nproc)" V=s
          } 2>&1 | tee logs/09_compile.log

      - name: Disk usage and outputs
        run: |
          {
            echo "===== Disk usage ====="
            date
            df -h

            echo
            echo "===== Output files ====="
            find openwrt/bin/targets -type f 2>/dev/null | sort || true
          } 2>&1 | tee logs/10_outputs.log

      - name: Prepare firmware files
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          mkdir -p release-files

          find openwrt/bin/targets -type f \
            \( -name "*.bin" -o -name "*.img" -o -name "*.img.gz" -o -name "*.itb" -o -name "*.manifest" -o -name "*.buildinfo" -o -name "*.json" \) \
            -exec cp -f {} release-files/ \;

          ls -lah release-files || true

      - name: Upload build logs artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Build_Logs_${{ github.run_number }}
          path: logs/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload firmware artifact
        if: env.UPLOAD_FIRMWARE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Firmware_${{ github.run_number }}
          path: release-files/**
          if-no-files-found: error
          retention-days: 14

      - name: Generate release tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "RELEASE_TAG=OpenWrt_Minimal_F50_WiFi_SFTP_$(date +'%Y%m%d_%H%M%S')" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        if: env.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: |
            Minimal OpenWrt 25.12.1 RAX3000M F50 cold-boot test build.

            Included:
            - RAX3000M target
            - LuCI basic UI
            - WiFi mt76 / mt7915e
            - First-boot WiFi enable script
            - SFTP via openssh-sftp-server
            - usbutils
            - kmod-usb-net
            - kmod-usb-net-cdc-ether
            - kmod-usb-net-rndis
            - optional CDC NCM/EEM/subset

            Excluded:
            - OpenClash
            - OpenList
            - Docker
            - DiskMan
            - Turbo ACC
            - extroot
            - custom F50 scripts
            - usb-no-autosuspend
            - usb-modeswitch
            - QMI / MBIM / serial stack
          files: release-files/*
          draft: false
          prerelease: false
