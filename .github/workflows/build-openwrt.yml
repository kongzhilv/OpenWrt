name: Build OpenWrt F50 WiFi SFTP ttyd Argon OpenList FixedMinimalDiskManTest

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - make
      - fix-rax3000m-emmc-target
    paths-ignore:
      - "*.md"
      - "LICENSE"

permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: v25.12.1
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: "true"
  UPLOAD_RELEASE: "true"
  TZ: Asia/Shanghai
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    name: build-f50-wifi-sftp-ttyd-argon-openlist-fixed-minimal-diskman-test
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f "$CONFIG_FILE"
          test -f "$DIY_P1_SH"
          test -f "$DIY_P2_SH"

      - name: Prepare folders
        run: |
          mkdir -p logs release-files

      - name: Free disk space
        timeout-minutes: 15
        run: |
          {
            echo "===== Free disk space ====="
            date

            sudo rm -rf /usr/share/dotnet || true
            sudo rm -rf /usr/local/lib/android || true
            sudo rm -rf /opt/ghc || true
            sudo rm -rf /opt/hostedtoolcache/CodeQL || true

            docker image prune --all --force || true

            sudo timedatectl set-timezone "$TZ" || true
            df -h
          } 2>&1 | tee logs/01_free_disk.log

      - name: Install build dependencies
        timeout-minutes: 60
        run: |
          {
            echo "===== Install build dependencies ====="
            date

            sudo apt-get update
            sudo apt-get -y install \
              build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
              gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip \
              zlib1g-dev file wget curl swig python3-dev qemu-utils libfuse-dev

            df -h
          } 2>&1 | tee logs/02_install_deps.log

      - name: Clone OpenWrt source
        run: |
          {
            echo "===== Clone OpenWrt source ====="
            date
            git clone -b "$REPO_BRANCH" --depth 1 "$REPO_URL" openwrt
            cd openwrt
            git log -1 --oneline
          } 2>&1 | tee logs/03_clone_source.log

      - name: DIY part 1
        run: |
          {
            echo "===== DIY part1 ====="
            date
            chmod +x "$DIY_P1_SH"
            cd openwrt
            "$GITHUB_WORKSPACE/$DIY_P1_SH"
          } 2>&1 | tee logs/04_diy_part1.log

      - name: Update feeds
        run: |
          {
            echo "===== Update feeds ====="
            date
            cd openwrt
            ./scripts/feeds update -a
          } 2>&1 | tee logs/05_feeds_update.log

      - name: Install feeds
        run: |
          {
            echo "===== Install feeds ====="
            date
            cd openwrt
            ./scripts/feeds install -a
          } 2>&1 | tee logs/06_feeds_install.log

      - name: DIY part 2 and defconfig
        run: |
          {
            echo "===== DIY part2 + defconfig ====="
            date

            chmod +x "$DIY_P2_SH"
            cp -f "$GITHUB_WORKSPACE/$CONFIG_FILE" openwrt/.config

            cd openwrt
            "$GITHUB_WORKSPACE/$DIY_P2_SH"

            make defconfig

            cp -f .config "$GITHUB_WORKSPACE/logs/07_final.config"
          } 2>&1 | tee logs/07_diy_part2_and_defconfig.log

      - name: Validate final config
        run: |
          {
            echo "===== Validate final config ====="
            date
            cd openwrt

            echo "===== Target ====="
            grep -E '^CONFIG_TARGET_.*=y|^CONFIG_TARGET_(BOARD|SUBTARGET|PROFILE)=' .config || true

            grep -q '^CONFIG_TARGET_mediatek=y' .config
            grep -q '^CONFIG_TARGET_mediatek_filogic=y' .config
            grep -q '^CONFIG_TARGET_mediatek_filogic_DEVICE_cmcc_rax3000m=y' .config
            grep -q '^CONFIG_TARGET_ROOTFS_SQUASHFS=y' .config

            echo "===== Must not be OpenWrt One ====="
            ! grep -q '^CONFIG_TARGET_mediatek_filogic_DEVICE_openwrt_one=y' .config
            ! grep -q '^CONFIG_TARGET_PROFILE="DEVICE_openwrt_one"' .config

            echo "===== Required base packages ====="
            grep -q '^CONFIG_PACKAGE_luci=y' .config
            grep -q '^CONFIG_PACKAGE_luci-i18n-base-zh-cn=y' .config
            grep -q '^CONFIG_PACKAGE_openssh-sftp-server=y' .config

            echo "===== Required Argon package ====="
            grep -q '^CONFIG_PACKAGE_luci-theme-argon=y' .config
            test -d package/luci-theme-argon
            test -f files/etc/uci-defaults/02-set-argon-theme
            grep -q "/luci-static/argon" files/etc/uci-defaults/02-set-argon-theme

            echo "===== Required OpenList package ====="
            test -d package/openlist
            test -d feeds/packages/lang/golang
            grep -q '^CONFIG_PACKAGE_openlist=y' .config
            grep -q '^CONFIG_PACKAGE_luci-app-openlist=y' .config
            grep -q '^CONFIG_PACKAGE_luci-i18n-openlist-zh-cn=y' .config

            echo "===== Required fixed minimal DiskMan package ====="

            echo "===== DiskMan related final config ====="
            grep -E 'CONFIG_PACKAGE_(luci-app-diskman|luci-i18n-diskman|luci-compat|luci-lua-runtime|luci-lib-base|luci-lib-nixio|luci-lib-ip|luci-lib-jsonc|luci-lib-ipkg|lua|libubus-lua|liblucihttp-lua|ucode-mod-lua|parted|fdisk|blkid|lsblk|partx-utils|losetup|e2fsprogs|smartmontools)=' .config || true
            grep -E '^# CONFIG_PACKAGE_(luci-app-diskman|luci-i18n-diskman|luci-compat|luci-lua-runtime|luci-lib-base|luci-lib-nixio|luci-lib-ip|luci-lib-jsonc|luci-lib-ipkg|lua|libubus-lua|liblucihttp-lua|ucode-mod-lua|parted|fdisk|blkid|lsblk|partx-utils|losetup|e2fsprogs|smartmontools) is not set' .config || true

            echo "===== DiskMan package directories ====="
            find package -maxdepth 6 -type d -iname '*diskman*' | sort || true
            find package -maxdepth 8 -type f -path '*diskman*Makefile*' | sort || true

            echo "===== DiskMan Makefile content after patch ====="
            find package/luci-app-diskman -type f -name Makefile -print -exec grep -nE 'LUCI_DEPENDS|DEPENDS|btrfs|exfat|f2fs|rpcd-mod-file|ntfs|dosfstools|kmod-fs|luci-lib-ipkg|parted|smartmontools|blkid|lsblk' {} \; || true

            require_config() {
              local key="$1"

              if grep -q "^${key}=y" .config; then
                echo "OK: ${key}=y"
              else
                echo "ERROR: missing ${key}=y"
                echo "----- matched lines for ${key} -----"
                grep -E "^${key}=|^# ${key} is not set" .config || true
                echo "----- nearby DiskMan-related config -----"
                grep -E 'CONFIG_PACKAGE_(luci-app-diskman|luci-i18n-diskman|luci-compat|luci-lua-runtime|luci-lib-base|luci-lib-nixio|luci-lib-ip|luci-lib-jsonc|luci-lib-ipkg|lua|libubus-lua|liblucihttp-lua|ucode-mod-lua|parted|fdisk|blkid|lsblk|partx-utils|losetup|e2fsprogs|smartmontools)' .config || true
                exit 1
              fi
            }

            if [ ! -d package/luci-app-diskman ]; then
              echo "ERROR: package/luci-app-diskman missing"
              find package -maxdepth 6 -type d -iname '*diskman*' | sort || true
              exit 1
            fi

            require_config CONFIG_PACKAGE_luci-app-diskman
            require_config CONFIG_PACKAGE_luci-i18n-diskman-zh-cn
            require_config CONFIG_PACKAGE_luci-compat
            require_config CONFIG_PACKAGE_luci-lua-runtime
            require_config CONFIG_PACKAGE_luci-lib-base
            require_config CONFIG_PACKAGE_luci-lib-nixio
            require_config CONFIG_PACKAGE_luci-lib-ip
            require_config CONFIG_PACKAGE_luci-lib-jsonc
            require_config CONFIG_PACKAGE_luci-lib-ipkg
            require_config CONFIG_PACKAGE_lua
            require_config CONFIG_PACKAGE_libubus-lua
            require_config CONFIG_PACKAGE_liblucihttp-lua
            require_config CONFIG_PACKAGE_ucode-mod-lua
            require_config CONFIG_PACKAGE_parted
            require_config CONFIG_PACKAGE_fdisk
            require_config CONFIG_PACKAGE_blkid
            require_config CONFIG_PACKAGE_lsblk
            require_config CONFIG_PACKAGE_e2fsprogs
            require_config CONFIG_PACKAGE_smartmontools

            echo "===== Required ttyd packages ====="
            grep -q '^CONFIG_PACKAGE_ttyd=y' .config
            grep -q '^CONFIG_PACKAGE_luci-app-ttyd=y' .config
            grep -q '^CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y' .config

            echo "===== Required common tools ====="
            grep -q '^CONFIG_PACKAGE_bash=y' .config
            grep -q '^CONFIG_PACKAGE_curl=y' .config
            grep -q '^CONFIG_PACKAGE_wget-ssl=y' .config
            grep -q '^CONFIG_PACKAGE_htop=y' .config
            grep -q '^CONFIG_PACKAGE_tcpdump=y' .config
            grep -q '^CONFIG_PACKAGE_iperf3=y' .config
            grep -q '^CONFIG_PACKAGE_mtr-json=y' .config
            grep -q '^CONFIG_PACKAGE_bind-dig=y' .config

            echo "===== Required WiFi packages ====="
            grep -q '^CONFIG_PACKAGE_kmod-mt76=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-mt7915e=y' .config
            grep -q '^CONFIG_PACKAGE_wpad-basic-mbedtls=y' .config
            grep -q '^CONFIG_PACKAGE_wireless-regdb=y' .config

            echo "===== Required F50 USB network packages ====="
            grep -q '^CONFIG_PACKAGE_usbutils=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-net=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-net-cdc-ether=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-net-rndis=y' .config

            echo "===== Embedded files ====="
            find files -type f | sort
            test -f files/etc/uci-defaults/01-enable-wifi
            test -f files/etc/uci-defaults/02-set-argon-theme

            bad_files="$(find files -type f | sort | grep -v -E '^(files/etc/uci-defaults/01-enable-wifi|files/etc/uci-defaults/02-set-argon-theme)$' || true)"
            if [ -n "$bad_files" ]; then
              echo "ERROR: unexpected embedded files:"
              echo "$bad_files"
              exit 1
            fi

            echo "===== Must remain removed in this FixedMinimalDiskManTest ====="
            ! grep -q '^CONFIG_PACKAGE_luci-app-diskman_INCLUDE_ntfs_3g_utils=y' .config
            ! grep -q '^CONFIG_PACKAGE_luci-app-diskman_INCLUDE_btrfs_progs=y' .config
            ! grep -q '^CONFIG_PACKAGE_luci-app-diskman_INCLUDE_mdadm=y' .config
            ! grep -q '^CONFIG_PACKAGE_luci-app-diskman_INCLUDE_kmod_md_raid456=y' .config
            ! grep -q '^CONFIG_PACKAGE_luci-app-diskman_INCLUDE_kmod_md_linears=y' .config
            ! grep -q '^CONFIG_PACKAGE_rpcd-mod-file=y' .config
            ! grep -q '^CONFIG_PACKAGE_luci-app-argon-config=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-usb-storage=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-usb-storage-uas=y' .config
            ! grep -q '^CONFIG_PACKAGE_block-mount=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-fs-ext4=y' .config
            ! grep -q '^CONFIG_PACKAGE_mount-utils=y' .config
            ! grep -q '^CONFIG_PACKAGE_btrfs-progs=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-fs-btrfs=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-fs-exfat=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-fs-msdos=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-fs-ntfs3=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-fs-vfat=y' .config
            ! grep -q '^CONFIG_PACKAGE_dosfstools=y' .config
            ! grep -q '^CONFIG_PACKAGE_exfat-fsck=y' .config
            ! grep -q '^CONFIG_PACKAGE_exfat-mkfs=y' .config
            ! grep -q '^CONFIG_PACKAGE_f2fsck=y' .config
            ! grep -q '^CONFIG_PACKAGE_mkf2fs=y' .config
            ! grep -q '^CONFIG_PACKAGE_libf2fs6=y' .config
            ! grep -q '^CONFIG_PACKAGE_ntfs-3g-utils=y' .config
            ! grep -q '^CONFIG_PACKAGE_luci-app-openclash=y' .config
            ! grep -q '^CONFIG_PACKAGE_luci-app-turboacc=y' .config
            ! grep -q '^CONFIG_PACKAGE_dockerd=y' .config
            ! grep -q '^CONFIG_PACKAGE_docker-compose=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-usb-net-cdc-mbim=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-usb-wdm=y' .config
            ! grep -q '^CONFIG_PACKAGE_kmod-usb-serial=y' .config
            ! grep -q '^CONFIG_PACKAGE_usb-modeswitch=y' .config
            ! grep -q '^CONFIG_PACKAGE_usbmuxd=y' .config
            ! test -e files/sbin/tempinfo
            ! test -e files/usr/share/rpcd/acl.d/luci-app-tempinfo.json
            ! test -e files/www/luci-static/resources/view/status/include/10_system.js
            ! test -e files/www/luci-static/resources/view/status/include/11_all_temperatures.js
            ! test -e files/etc/uci-defaults/03-argon-dark-line-fix
            ! test -e files/usr/sbin/extroot-status
            ! test -e files/usr/sbin/extroot-setup

            echo "Validate passed."
          } 2>&1 | tee logs/08_validate_config.log

      - name: Download sources
        run: |
          {
            echo "===== Download sources ====="
            date
            cd openwrt
            make download -j8 V=s
          } 2>&1 | tee logs/09_download.log

      - name: Build OpenWrt
        run: |
          {
            echo "===== Build OpenWrt ====="
            date
            cd openwrt
            make -j4 V=s || make -j1 V=s
          } 2>&1 | tee logs/10_compile.log

      - name: Disk usage and outputs
        if: ${{ always() }}
        run: |
          {
            echo "===== Disk usage ====="
            date
            df -h

            echo
            echo "===== Output files ====="
            find openwrt/bin/targets -type f 2>/dev/null | sort || true
          } 2>&1 | tee logs/11_outputs.log

      - name: Prepare firmware files
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          mkdir -p release-files

          find openwrt/bin/targets -type f \
            \( -name "*.bin" -o -name "*.img" -o -name "*.img.gz" -o -name "*.itb" -o -name "*.manifest" -o -name "*.buildinfo" -o -name "*.json" \) \
            -exec cp -f {} release-files/ \;

          ls -lah release-files

      - name: Validate firmware manifest forbidden packages
        run: |
          {
            echo "===== Validate firmware manifest forbidden packages ====="

            manifest="$(find release-files -type f -name '*.manifest' | head -n 1)"

            if [ -z "$manifest" ]; then
              echo "ERROR: manifest not found"
              find release-files -type f | sort
              exit 1
            fi

            echo "manifest=$manifest"

            echo "===== suspicious packages in manifest ====="
            grep -Ei 'diskman|rpcd-mod-file|btrfs|exfat|f2fs|ntfs|dosfstools|kmod-fs|usb-storage|block-mount' "$manifest" || true

            forbidden='^(rpcd-mod-file|btrfs-progs|kmod-fs-btrfs|kmod-fs-exfat|kmod-fs-msdos|kmod-fs-ntfs3|kmod-fs-vfat|dosfstools|exfat-fsck|exfat-mkfs|f2fsck|mkf2fs|libf2fs6|ntfs-3g-utils|kmod-usb-storage|kmod-usb-storage-uas|block-mount|kmod-fs-ext4|mount-utils)([[:space:]-]|$)'

            if grep -Eq "$forbidden" "$manifest"; then
              echo "ERROR: forbidden packages found in firmware manifest:"
              grep -E "$forbidden" "$manifest"
              exit 1
            fi

            echo "Manifest validate passed."
          } 2>&1 | tee logs/12_validate_manifest.log

      - name: Upload build logs artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Build_Logs_${{ github.run_number }}
          path: logs/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload firmware artifact
        if: env.UPLOAD_FIRMWARE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Firmware_${{ github.run_number }}
          path: release-files/**
          if-no-files-found: error
          retention-days: 14

      - name: Generate release tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "RELEASE_TAG=OpenWrt_F50_WiFi_SFTP_ttyd_Argon_OpenList_FixedMinimalDiskManTest_$(date +'%Y%m%d_%H%M%S')" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        if: env.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: |
            RAX3000M FixedMinimalDiskManTest build.

            Included:
            - F50 USB Ethernet drivers
            - WiFi
            - SFTP
            - ttyd
            - luci-theme-argon
            - OpenList
            - patched minimal DiskMan LuCI package
            - DiskMan Lua LuCI runtime dependencies
            - basic disk user tools only

            Still removed for this test:
            - rpcd-mod-file
            - luci-app-argon-config
            - tempinfo / custom temperature LuCI JS
            - dark-line CSS patch
            - USB storage / UAS
            - block-mount
            - ext4 filesystem support
            - btrfs/exfat/f2fs/ntfs tools and kmods
            - manual extroot scripts
            - OpenClash
            - Docker
            - Turbo ACC
          files: release-files/*
          draft: false
          prerelease: false
