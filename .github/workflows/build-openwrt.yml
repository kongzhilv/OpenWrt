name: Build OpenWrt Official Latest (RAX3000M eMMC)

on:
  repository_dispatch:
  workflow_dispatch:

# 赋予 GitHub Actions 写入 Releases 的权限
permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: 检出当前仓库代码
      uses: actions/checkout@main

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 修复 Ubuntu 24.04 源误删问题，替换 python3-distutils 为 setuptools
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo apt-get update
        sudo apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget
        sudo timedatectl set-timezone "$TZ"

    - name: 克隆 OpenWrt 官方源码
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: 加载自定义软件源 (DIY-part1)
      run: |
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新 & 安装 Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载配置并应用补丁 (DIY-part2)
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        make defconfig

    - name: 下载软件包依赖
      id: package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 提取核心固件与软件列表 (大扫除机制)
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        
        # 只保留: itb升级包、emmc的引导bin和fip包、manifest软件列表清单。其他垃圾全删。
        find . -maxdepth 1 -type f ! -name "*sysupgrade.itb" ! -name "*emmc*.bin" ! -name "*emmc*.fip" ! -name "*.manifest" -exec rm -f {} +
        
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到 Artifacts (备用)
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      with:
        name: OpenWrt_Firmware_RAX3000M_eMMC
        path: ${{ env.FIRMWARE }}

    - name: 生成 Release 标签
      id: tag
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "🚀 RAX3000M eMMC 专属纯净版编译完成" >> release.txt
        echo "📦 已包含: OpenClash, AdGuardHome, Docker, Filebrowser, 完整USB/5G驱动" >> release.txt
        echo "📄 详细安装的软件列表请查看下方下载处的 .manifest 文件" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 发布至 Releases
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
