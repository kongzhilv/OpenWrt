name: Build OpenWrt

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master
      - fix-rax3000m-emmc-target
    paths-ignore:
      - "*.md"
      - "LICENSE"

permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: v25.12.1
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: "true"
  UPLOAD_RELEASE: "true"
  TZ: Asia/Shanghai
  DEBIAN_FRONTEND: noninteractive

  # full: Turbo ACC 完整模式，含 Shortcut-FE
  # no-sfe: 不带 Shortcut-FE，只保留 flow offload/fullcone 等
  # off: 不接入 Turbo ACC
  TURBOACC_MODE: "full"

jobs:
  build:
    name: build
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f "$CONFIG_FILE"
          test -f "$DIY_P1_SH"
          test -f "$DIY_P2_SH"

      - name: Prepare folders
        run: |
          mkdir -p logs release-files

      - name: Init build environment
        run: |
          {
            echo "===== 初始化编译环境 ====="
            date

            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
            sudo docker image prune --all --force || true

            sudo apt-get update

            sudo apt-get -y install \
              build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
              gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip \
              zlib1g-dev file wget curl swig python3-dev qemu-utils libfuse-dev

            sudo timedatectl set-timezone "$TZ" || true

            df -h
          } 2>&1 | tee logs/01_init_env.log

      - name: Clone OpenWrt source
        run: |
          {
            echo "===== 克隆源码 ====="
            date

            echo "正在克隆官方 OpenWrt 仓库，目标版本: $REPO_BRANCH"
            git clone -b "$REPO_BRANCH" --depth 1 "$REPO_URL" openwrt

            cd openwrt
            git log -1 --oneline
          } 2>&1 | tee logs/02_clone_source.log

      - name: DIY part 1
        run: |
          {
            echo "===== DIY-part1 ====="
            date

            chmod +x "$DIY_P1_SH"

            cd openwrt
            "$GITHUB_WORKSPACE/$DIY_P1_SH"
          } 2>&1 | tee logs/03_diy_part1.log

      - name: Update feeds
        run: |
          {
            echo "===== 更新 Feeds ====="
            date

            cd openwrt
            ./scripts/feeds update -a
          } 2>&1 | tee logs/04_feeds_update.log

      - name: Install feeds
        run: |
          {
            echo "===== 安装 Feeds ====="
            date

            cd openwrt
            ./scripts/feeds install -a

            echo "===== 检查关键包是否被 feeds 识别 ====="
            ./scripts/feeds list | grep -E 'luci-app-(diskman|temp-status|ttyd)|luci-app-turboacc|luci-app-openlist' || true
          } 2>&1 | tee logs/05_feeds_install.log

      - name: DIY part 2 and defconfig
        run: |
          {
            echo "===== DIY-part2 + defconfig ====="
            date

            chmod +x "$DIY_P2_SH"

            cp -f "$GITHUB_WORKSPACE/$CONFIG_FILE" openwrt/.config

            cd openwrt

            "$GITHUB_WORKSPACE/$DIY_P2_SH"

            make defconfig

            cp -f .config "$GITHUB_WORKSPACE/logs/06_final.config"
          } 2>&1 | tee logs/06_diy_part2_and_defconfig.log

      - name: Validate config
        run: |
          {
            echo "===== 校验最终配置 ====="
            date

            cd openwrt

            echo "===== 当前最终启用的 TARGET_DEVICE ====="
            grep -E '^CONFIG_TARGET_.*=y|^CONFIG_TARGET_(BOARD|SUBTARGET|PROFILE)=' .config || true

            grep -q '^CONFIG_TARGET_mediatek=y' .config
            grep -q '^CONFIG_TARGET_mediatek_filogic=y' .config
            grep -q '^CONFIG_TARGET_mediatek_filogic_DEVICE_cmcc_rax3000m=y' .config

            echo "===== 检查关键插件是否进入最终 .config ====="
            grep -q '^CONFIG_PACKAGE_luci-app-diskman=y' .config
            grep -q '^CONFIG_PACKAGE_luci-app-temp-status=y' .config
            grep -q '^CONFIG_PACKAGE_luci-app-ttyd=y' .config
            grep -q '^CONFIG_PACKAGE_luci-app-openlist=y' .config
            grep -q '^CONFIG_PACKAGE_luci-app-turboacc=y' .config

            echo "===== 检查 eMMC extroot 必需包 ====="
            grep -q '^CONFIG_PACKAGE_block-mount=y' .config
            grep -q '^CONFIG_PACKAGE_e2fsprogs=y' .config
            grep -q '^CONFIG_PACKAGE_parted=y' .config
            grep -q '^CONFIG_PACKAGE_blkid=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-fs-ext4=y' .config

            echo "===== 检查 USB 网卡 / F50 相关驱动 ====="
            grep -q '^CONFIG_PACKAGE_kmod-usb-net=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-net-cdc-ether=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-net-cdc-ncm=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-net-rndis=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-net-rtl8152=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-net-asix=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-net-asix-ax88179=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-net-aqc111=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-wdm=y' .config
            grep -q '^CONFIG_PACKAGE_usbutils=y' .config

            echo "===== 检查不再集成 iPhone/usbmuxd/usb-modeswitch ====="

            if grep -q '^CONFIG_PACKAGE_usbmuxd=y' .config; then
              echo "错误：不应再集成 usbmuxd"
              exit 1
            fi

            if grep -q '^CONFIG_PACKAGE_libimobiledevice=y' .config; then
              echo "错误：不应再集成 libimobiledevice"
              exit 1
            fi

            if grep -q '^CONFIG_PACKAGE_kmod-usb-net-ipheth=y' .config; then
              echo "错误：不应再集成 ipheth"
              exit 1
            fi

            if grep -q '^CONFIG_PACKAGE_usb-modeswitch=y' .config; then
              echo "错误：F50 稳定前不应再集成 usb-modeswitch"
              exit 1
            fi

            echo "===== 检查 files 嵌入内容 ====="

            echo "===== 当前 files/etc/uci-defaults ====="
            ls -lah files/etc/uci-defaults || true

            echo "===== 当前 files/usr/sbin ====="
            ls -lah files/usr/sbin || true

            echo "===== 当前 files/etc/init.d ====="
            ls -lah files/etc/init.d || true

            echo "===== 当前 files/etc/hotplug.d/net ====="
            ls -lah files/etc/hotplug.d/net || true

            echo "===== 当前 files/etc/hotplug.d/usb ====="
            ls -lah files/etc/hotplug.d/usb || true

            echo "===== 当前 files/etc/sysctl.d ====="
            ls -lah files/etc/sysctl.d || true

            test -f files/usr/sbin/emmc-extroot-setup
            test -f files/usr/sbin/f50-usb-guardian

            test -f files/etc/init.d/f50-usb-guardian

            test -f files/etc/uci-defaults/01-enable-wifi
            test -f files/etc/uci-defaults/96-enable-f50-usb-guardian
            test -f files/etc/uci-defaults/98-network-optimize
            test -f files/etc/uci-defaults/99-custom-setup
            test -f files/etc/uci-defaults/99-emmc-extroot

            test -f files/etc/hotplug.d/net/20-f50-usb-guardian
            test -f files/etc/hotplug.d/usb/20-f50-usb-guardian

            test -f files/etc/sysctl.d/99-bbr.conf

            echo "===== 检查 extroot 修复点 ====="
            grep -q 'CLEAN_EXTROOT="${CLEAN_EXTROOT:-1}"' files/usr/sbin/emmc-extroot-setup
            grep -q 'mkfs.ext4 -F -L extroot /dev/mmcblk0p6' files/usr/sbin/emmc-extroot-setup
            grep -q 'mount -t ext4 /dev/mmcblk0p6 /mnt/extroot' files/usr/sbin/emmc-extroot-setup
            grep -q 'mount -t ext4 /dev/mmcblk0p7 /mnt/data' files/usr/sbin/emmc-extroot-setup
            grep -q "option target '/overlay'" files/usr/sbin/emmc-extroot-setup
            grep -q "option target '/mnt/data'" files/usr/sbin/emmc-extroot-setup

            echo "===== 检查 F50 USB 根治脚本 ====="
            grep -q 'START=18' files/etc/init.d/f50-usb-guardian
            grep -q 'b8:d4:bc:9f:37:bd' files/usr/sbin/f50-usb-guardian
            grep -q 'f50usb0' files/usr/sbin/f50-usb-guardian
            grep -q '11200000.usb' files/usr/sbin/f50-usb-guardian
            grep -q 'xhci-mtk' files/usr/sbin/f50-usb-guardian
            grep -q 'reset attempt' files/usr/sbin/f50-usb-guardian
            grep -q 'low-frequency xhci reset' files/usr/sbin/f50-usb-guardian
            grep -q '/usr/sbin/f50-usb-guardian bind' files/etc/hotplug.d/net/20-f50-usb-guardian
            grep -q '/usr/sbin/f50-usb-guardian bind' files/etc/hotplug.d/usb/20-f50-usb-guardian

            echo "===== 检查旧脚本是否残留 ====="

            if [ -f files/etc/uci-defaults/05-emmc-extroot ]; then
              echo "错误：发现旧的 05-emmc-extroot。这个脚本会早于 WiFi 脚本执行，可能提前 reboot。"
              exit 1
            fi

            if [ -f files/etc/uci-defaults/97-enable-wifi ]; then
              echo "错误：发现旧的 97-enable-wifi。现在应使用 01-enable-wifi。"
              exit 1
            fi

            if find files -type f 2>/dev/null | grep -q 'f50-usb-fix'; then
              echo "错误：旧 f50-usb-fix 仍然残留"
              find files -type f 2>/dev/null | grep 'f50-usb-fix' || true
              exit 1
            fi

            echo "===== 检查不应再嵌入 factory 修复文件 ====="

            if [ -f files/usr/share/rax3000m/factory_fixed.bin ]; then
              echo "错误：不应再嵌入 factory_fixed.bin。当前机器 factory 已修好。"
              exit 1
            fi

            if find files -type f 2>/dev/null | grep -q 'rax3000m-factory'; then
              echo "错误：发现 factory 自动修复脚本残留。当前版本不应再自动写 /dev/mmcblk0p2。"
              find files -type f 2>/dev/null | grep 'rax3000m-factory' || true
              exit 1
            fi

            echo "最终配置校验通过"
          } 2>&1 | tee logs/07_validate_config.log

      - name: Download sources
        run: |
          {
            echo "===== 下载软件包依赖 ====="
            date

            cd openwrt
            make download -j8 V=s
          } 2>&1 | tee logs/08_download.log

      - name: Build OpenWrt
        run: |
          {
            echo "===== 多线程编译 ====="
            date

            cd openwrt
            echo "$(nproc) thread compile"
            make -j"$(nproc)" V=s
          } 2>&1 | tee logs/09_compile_parallel.log

      - name: Disk usage and outputs
        run: |
          {
            echo "===== 磁盘占用 ====="
            date

            df -h

            echo
            echo "===== 目录体积 ====="
            du -sh openwrt 2>/dev/null || true
            du -sh openwrt/dl 2>/dev/null || true
            du -sh openwrt/build_dir 2>/dev/null || true
            du -sh openwrt/staging_dir 2>/dev/null || true
            du -sh openwrt/bin 2>/dev/null || true

            echo
            echo "===== bin/targets 文件列表 ====="
            find openwrt/bin/targets -type f 2>/dev/null | sort || true
          } 2>&1 | tee logs/10_disk_and_outputs.log

      - name: Prepare firmware files
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          mkdir -p release-files

          find openwrt/bin/targets -type f \
            \( -name "*.bin" -o -name "*.img" -o -name "*.img.gz" -o -name "*.itb" -o -name "*.manifest" -o -name "*.buildinfo" -o -name "*.json" \) \
            -exec cp -f {} release-files/ \;

          ls -lah release-files || true

      - name: Upload build logs artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Build_Logs_${{ github.run_number }}
          path: logs/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload firmware artifact
        if: env.UPLOAD_FIRMWARE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Firmware_${{ github.run_number }}
          path: release-files/**
          if-no-files-found: error
          retention-days: 14

      - name: Generate release tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "RELEASE_TAG=OpenWrt_$(date +'%Y%m%d_%H%M%S')" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        if: env.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: |
            OpenWrt automated build

            - Source: ${{ env.REPO_URL }}
            - Branch/Tag: ${{ env.REPO_BRANCH }}
            - Workflow run: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
          files: release-files/*
          draft: false
          prerelease: false
