name: Build OpenWrt (shiyu1314 Closed-Source Base)

on:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: write

env:
  # 核心修改：使用 shiyu1314 的源码和 25.12 分支
  REPO_URL: https://github.com/shiyu1314/openwrt-source
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: 检出当前仓库代码
      uses: actions/checkout@main

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo apt-get update
        sudo apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget
        sudo timedatectl set-timezone "$TZ"

    - name: 克隆源码
      run: |
        git clone $REPO_URL openwrt
        cd openwrt
        # 模仿 shiyu1314 仓库的逻辑，动态寻找最新 v25.* 标签并切换
        _release_tag=$(git tag --sort=taggerdate --list 'v25.*' | tail -1)
        echo "查找到最新正式版标签：$_release_tag，正在切换..."
        git checkout $_release_tag

    - name: 加载自定义软件源 (DIY-part1)
      run: |
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新 & 安装 Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载配置并应用补丁 (DIY-part2)
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        make defconfig

    - name: 下载软件包依赖
      id: package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译源码
      id: compile
      env:
        GITHUB_ACTIONS: false
        CI: false
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        # 恢复纯净编译命令，去掉惹祸的 yes ""
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 提取核心固件与软件列表
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        # 这个源码自带打包逻辑，所以放宽条件，保留 .bin 和 .itb
        find . -maxdepth 1 -type f ! -name "*.itb" ! -name "*.bin" ! -name "*.img*" ! -name "*.gz" ! -name "*.manifest" -exec rm -f {} +
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        
    - name: 生成 Release 标签
      id: tag
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "🚀 RAX3000M eMMC 闭源驱动满血版编译完成" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 发布至 Releases
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
