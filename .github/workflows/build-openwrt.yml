name: Build OpenWrt F50 WiFi SFTP ttyd Argon OpenList FixedMinimalDiskManTest

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - make
      - fix-rax3000m-emmc-target
    paths-ignore:
      - "*.md"
      - "LICENSE"

permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: v25.12.1
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: "true"
  UPLOAD_RELEASE: "true"
  STRICT_MANIFEST_CHECK: "false"
  TZ: Asia/Shanghai
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    name: build-f50-wifi-sftp-ttyd-argon-openlist-fixed-minimal-diskman-test
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          mkdir -p logs release-files diagnostics
          {
            echo "===== Check required files ====="
            date
            pwd
            ls -lah
            test -f "$CONFIG_FILE"
            test -f "$DIY_P1_SH"
            test -f "$DIY_P2_SH"
          } 2>&1 | tee logs/00_check_required_files.log

      - name: Prepare folders
        run: |
          {
            echo "===== Prepare folders ====="
            date
            mkdir -p logs release-files diagnostics
            df -h
          } 2>&1 | tee logs/01_prepare_folders.log

      - name: Free disk space
        timeout-minutes: 15
        run: |
          {
            echo "===== Free disk space ====="
            date

            sudo rm -rf /usr/share/dotnet || true
            sudo rm -rf /usr/local/lib/android || true
            sudo rm -rf /opt/ghc || true
            sudo rm -rf /opt/hostedtoolcache/CodeQL || true

            docker image prune --all --force || true

            sudo timedatectl set-timezone "$TZ" || true
            df -h
          } 2>&1 | tee logs/02_free_disk.log

      - name: Install build dependencies
        timeout-minutes: 60
        run: |
          {
            echo "===== Install build dependencies ====="
            date

            sudo apt-get update
            sudo apt-get -y install \
              build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
              gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip \
              zlib1g-dev file wget curl swig python3-dev qemu-utils libfuse-dev

            df -h
          } 2>&1 | tee logs/03_install_deps.log

      - name: Clone OpenWrt source
        run: |
          {
            echo "===== Clone OpenWrt source ====="
            date
            git clone -b "$REPO_BRANCH" --depth 1 "$REPO_URL" openwrt
            cd openwrt
            git log -1 --oneline
            git status --short
          } 2>&1 | tee logs/04_clone_source.log

      - name: DIY part 1
        run: |
          {
            echo "===== DIY part1 ====="
            date
            chmod +x "$DIY_P1_SH"
            cd openwrt
            "$GITHUB_WORKSPACE/$DIY_P1_SH"
          } 2>&1 | tee logs/05_diy_part1.log

      - name: Update feeds
        run: |
          {
            echo "===== Update feeds ====="
            date
            cd openwrt
            ./scripts/feeds update -a
          } 2>&1 | tee logs/06_feeds_update.log

      - name: Install feeds
        run: |
          {
            echo "===== Install feeds ====="
            date
            cd openwrt
            ./scripts/feeds install -a
          } 2>&1 | tee logs/07_feeds_install.log

      - name: DIY part 2 and defconfig
        run: |
          {
            echo "===== DIY part2 + defconfig ====="
            date

            chmod +x "$DIY_P2_SH"
            cp -f "$GITHUB_WORKSPACE/$CONFIG_FILE" openwrt/.config

            cd openwrt
            "$GITHUB_WORKSPACE/$DIY_P2_SH"

            echo "===== Force refresh OpenWrt package metadata ====="
            rm -rf tmp

            echo "===== Generate defconfig ====="
            make defconfig V=s

            echo "===== Save final config ====="
            cp -f .config "$GITHUB_WORKSPACE/logs/08_final.config"

            echo "===== Check DiskMan in generated package index ====="
            grep -R "luci-app-diskman" tmp/.packageinfo tmp/.config-package.in tmp/.config-package.in.* 2>/dev/null || true
            grep -R "luci-i18n-diskman" tmp/.packageinfo tmp/.config-package.in tmp/.config-package.in.* 2>/dev/null || true

            echo "===== Check DiskMan in final .config ====="
            grep -E 'CONFIG_PACKAGE_(luci-app-diskman|luci-i18n-diskman)' .config || true
            grep -E '^# CONFIG_PACKAGE_(luci-app-diskman|luci-i18n-diskman)' .config || true

            if ! grep -q '^CONFIG_PACKAGE_luci-app-diskman=y' .config; then
              echo "ERROR: luci-app-diskman still not selected after package metadata refresh"
              echo "===== package/luci-app-diskman tree ====="
              find package/luci-app-diskman -maxdepth 5 -type f | sort || true

              echo "===== package/luci-app-diskman Makefile ====="
              sed -n '1,220p' package/luci-app-diskman/Makefile || true

              echo "===== tmp package index diskman search ====="
              grep -R "diskman" tmp 2>/dev/null | head -200 || true

              exit 1
            fi
          } 2>&1 | tee logs/08_diy_part2_and_defconfig.log

      - name: Validate final config
        run: |
          {
            echo "===== Validate final config ====="
            date
            cd openwrt

            echo "===== Target ====="
            grep -E '^CONFIG_TARGET_.*=y|^CONFIG_TARGET_(BOARD|SUBTARGET|PROFILE)=' .config || true

            grep -q '^CONFIG_TARGET_mediatek=y' .config
            grep -q '^CONFIG_TARGET_mediatek_filogic=y' .config
            grep -q '^CONFIG_TARGET_mediatek_filogic_DEVICE_cmcc_rax3000m=y' .config
            grep -q '^CONFIG_TARGET_ROOTFS_SQUASHFS=y' .config

            echo "===== Must not be OpenWrt One ====="
            ! grep -q '^CONFIG_TARGET_mediatek_filogic_DEVICE_openwrt_one=y' .config
            ! grep -q '^CONFIG_TARGET_PROFILE="DEVICE_openwrt_one"' .config

            echo "===== Required base packages ====="
            grep -q '^CONFIG_PACKAGE_luci=y' .config
            grep -q '^CONFIG_PACKAGE_luci-i18n-base-zh-cn=y' .config
            grep -q '^CONFIG_PACKAGE_openssh-sftp-server=y' .config

            echo "===== Required Argon package ====="
            grep -q '^CONFIG_PACKAGE_luci-theme-argon=y' .config
            test -d package/luci-theme-argon
            test -f files/etc/uci-defaults/02-set-argon-theme
            grep -q "/luci-static/argon" files/etc/uci-defaults/02-set-argon-theme

            echo "===== Required OpenList package ====="
            test -d package/openlist
            test -d feeds/packages/lang/golang
            grep -q '^CONFIG_PACKAGE_openlist=y' .config
            grep -q '^CONFIG_PACKAGE_luci-app-openlist=y' .config
            grep -q '^CONFIG_PACKAGE_luci-i18n-openlist-zh-cn=y' .config

            echo "===== Required fixed minimal DiskMan package ====="

            echo "===== DiskMan related final config ====="
            grep -E 'CONFIG_PACKAGE_(luci-app-diskman|luci-i18n-diskman|luci-compat|luci-lua-runtime|luci-lib-base|luci-lib-nixio|luci-lib-ip|luci-lib-jsonc|luci-lib-ipkg|lua|libubus-lua|liblucihttp-lua|ucode-mod-lua|parted|fdisk|blkid|lsblk|partx-utils|losetup|e2fsprogs|smartmontools)' .config || true

            require_config() {
              local key="$1"

              if grep -q "^${key}=y" .config; then
                echo "OK: ${key}=y"
              else
                echo "ERROR: missing ${key}=y"
                echo "----- matched lines for ${key} -----"
                grep -E "^${key}=|^# ${key} is not set" .config || true
                echo "----- nearby DiskMan-related config -----"
                grep -E 'CONFIG_PACKAGE_(luci-app-diskman|luci-i18n-diskman|luci-compat|luci-lua-runtime|luci-lib-base|luci-lib-nixio|luci-lib-ip|luci-lib-jsonc|luci-lib-ipkg|lua|libubus-lua|liblucihttp-lua|ucode-mod-lua|parted|fdisk|blkid|lsblk|partx-utils|losetup|e2fsprogs|smartmontools)' .config || true
                exit 1
              fi
            }

            if [ ! -d package/luci-app-diskman ]; then
              echo "ERROR: package/luci-app-diskman missing"
              find package -maxdepth 6 -type d -iname '*diskman*' | sort || true
              exit 1
            fi

            require_config CONFIG_PACKAGE_luci-app-diskman
            require_config CONFIG_PACKAGE_luci-i18n-diskman-zh-cn
            require_config CONFIG_PACKAGE_luci-compat
            require_config CONFIG_PACKAGE_luci-lua-runtime
            require_config CONFIG_PACKAGE_luci-lib-base
            require_config CONFIG_PACKAGE_luci-lib-nixio
            require_config CONFIG_PACKAGE_luci-lib-ip
            require_config CONFIG_PACKAGE_luci-lib-jsonc
            require_config CONFIG_PACKAGE_luci-lib-ipkg
            require_config CONFIG_PACKAGE_lua
            require_config CONFIG_PACKAGE_libubus-lua
            require_config CONFIG_PACKAGE_liblucihttp-lua
            require_config CONFIG_PACKAGE_ucode-mod-lua
            require_config CONFIG_PACKAGE_parted
            require_config CONFIG_PACKAGE_fdisk
            require_config CONFIG_PACKAGE_blkid
            require_config CONFIG_PACKAGE_lsblk
            require_config CONFIG_PACKAGE_e2fsprogs
            require_config CONFIG_PACKAGE_smartmontools

            echo "===== Required ttyd packages ====="
            grep -q '^CONFIG_PACKAGE_ttyd=y' .config
            grep -q '^CONFIG_PACKAGE_luci-app-ttyd=y' .config
            grep -q '^CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y' .config

            echo "===== Required common tools ====="
            grep -q '^CONFIG_PACKAGE_bash=y' .config
            grep -q '^CONFIG_PACKAGE_curl=y' .config
            grep -q '^CONFIG_PACKAGE_wget-ssl=y' .config
            grep -q '^CONFIG_PACKAGE_htop=y' .config
            grep -q '^CONFIG_PACKAGE_tcpdump=y' .config
            grep -q '^CONFIG_PACKAGE_iperf3=y' .config
            grep -q '^CONFIG_PACKAGE_mtr-json=y' .config
            grep -q '^CONFIG_PACKAGE_bind-dig=y' .config

            echo "===== Required WiFi packages ====="
            grep -q '^CONFIG_PACKAGE_kmod-mt76=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-mt7915e=y' .config
            grep -q '^CONFIG_PACKAGE_wpad-basic-mbedtls=y' .config
            grep -q '^CONFIG_PACKAGE_wireless-regdb=y' .config

            echo "===== Required F50 USB network packages ====="
            grep -q '^CONFIG_PACKAGE_usbutils=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-net=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-net-cdc-ether=y' .config
            grep -q '^CONFIG_PACKAGE_kmod-usb-net-rndis=y' .config

            echo "===== Embedded files ====="
            find files -type f | sort
            test -f files/etc/uci-defaults/01-enable-wifi
            test -f files/etc/uci-defaults/02-set-argon-theme

            bad_files="$(find files -type f | sort | grep -v -E '^(files/etc/uci-defaults/01-enable-wifi|files/etc/uci-defaults/02-set-argon-theme)$' || true)"
            if [ -n "$bad_files" ]; then
              echo "ERROR: unexpected embedded files:"
              echo "$bad_files"
              exit 1
            fi

            echo "Validate passed."
          } 2>&1 | tee logs/09_validate_config.log

      - name: Download sources
        run: |
          {
            echo "===== Download sources ====="
            date
            cd openwrt
            make download -j8 V=s
          } 2>&1 | tee logs/10_download.log

      - name: Build OpenWrt
        run: |
          {
            echo "===== Build OpenWrt ====="
            date
            cd openwrt

            echo "===== First build: make -j4 V=s ====="
            set +e
            make -j4 V=s
            rc="$?"
            set -e

            if [ "$rc" -ne 0 ]; then
              echo "===== make -j4 failed with rc=$rc, retry single thread ====="
              make -j1 V=s
            fi

            echo "===== Build done ====="
            date
          } 2>&1 | tee logs/11_compile.log

      - name: Disk usage and outputs
        if: ${{ always() }}
        run: |
          {
            echo "===== Disk usage and outputs ====="
            date
            df -h

            echo
            echo "===== Output files ====="
            find openwrt/bin/targets -type f 2>/dev/null | sort || true

            echo
            echo "===== Output sizes ====="
            find openwrt/bin/targets -type f -exec ls -lah {} \; 2>/dev/null | sort || true
          } 2>&1 | tee logs/12_outputs.log

      - name: Prepare firmware files
        if: ${{ always() && env.UPLOAD_FIRMWARE == 'true' }}
        run: |
          {
            echo "===== Prepare firmware files ====="
            date
            mkdir -p release-files

            if [ -d openwrt/bin/targets ]; then
              find openwrt/bin/targets -type f \
                \( -name "*.bin" -o -name "*.img" -o -name "*.img.gz" -o -name "*.itb" -o -name "*.manifest" -o -name "*.buildinfo" -o -name "*.json" -o -name "*.sha256sums" \) \
                -exec cp -f {} release-files/ \;
            fi

            echo "===== release-files ====="
            find release-files -type f -exec ls -lah {} \; 2>/dev/null | sort || true
          } 2>&1 | tee logs/13_prepare_firmware.log

      - name: Validate firmware manifest forbidden packages
        if: ${{ always() }}
        run: |
          {
            echo "===== Validate firmware manifest forbidden packages ====="
            date

            manifest="$(find release-files openwrt/bin/targets -type f -name '*.manifest' 2>/dev/null | head -n 1 || true)"

            if [ -z "$manifest" ]; then
              echo "::warning::manifest not found"
              find release-files openwrt/bin/targets -type f 2>/dev/null | sort || true
              exit 0
            fi

            echo "manifest=$manifest"

            echo "===== suspicious packages in manifest ====="
            grep -Ei 'diskman|rpcd-mod-file|btrfs|exfat|f2fs|ntfs|dosfstools|kmod-fs|usb-storage|block-mount' "$manifest" || true

            # 注意：
            # rpcd-mod-file 不再作为硬失败项。
            # 当前 OpenWrt/LuCI 组合会由 luci-base 带入 rpcd-mod-file。
            # 这里保留显示，但默认不 fail。
            forbidden='^(btrfs-progs|kmod-fs-btrfs|kmod-fs-exfat|kmod-fs-msdos|kmod-fs-ntfs3|kmod-fs-vfat|dosfstools|exfat-fsck|exfat-mkfs|f2fsck|mkf2fs|libf2fs6|ntfs-3g-utils|kmod-usb-storage|kmod-usb-storage-uas|block-mount|kmod-fs-ext4|mount-utils)([[:space:]-]|$)'

            if grep -Eq "$forbidden" "$manifest"; then
              echo "::warning::forbidden-like packages found in firmware manifest:"
              grep -E "$forbidden" "$manifest" || true

              if [ "$STRICT_MANIFEST_CHECK" = "true" ]; then
                echo "STRICT_MANIFEST_CHECK=true, fail now."
                exit 1
              else
                echo "STRICT_MANIFEST_CHECK=false, treat as warning only."
              fi
            else
              echo "Manifest validate passed."
            fi
          } 2>&1 | tee logs/14_validate_manifest.log

      - name: Collect full diagnostics
        if: ${{ always() }}
        run: |
          set +e
          mkdir -p diagnostics/root diagnostics/openwrt diagnostics/openwrt/tmp diagnostics/openwrt/package diagnostics/openwrt/bin diagnostics/logs

          echo "===== Collect full diagnostics =====" | tee diagnostics/00_collect.log
          date | tee -a diagnostics/00_collect.log

          echo "===== Runner info =====" > diagnostics/root/runner_info.txt
          uname -a >> diagnostics/root/runner_info.txt 2>&1
          lsb_release -a >> diagnostics/root/runner_info.txt 2>&1
          df -h >> diagnostics/root/runner_info.txt 2>&1
          free -h >> diagnostics/root/runner_info.txt 2>&1
          env | sort >> diagnostics/root/env.txt 2>&1

          cp -a logs diagnostics/logs 2>/dev/null || true

          if [ -d openwrt ]; then
            cd openwrt

            echo "===== Git =====" > "$GITHUB_WORKSPACE/diagnostics/openwrt/git.txt"
            git log -1 --oneline >> "$GITHUB_WORKSPACE/diagnostics/openwrt/git.txt" 2>&1
            git status --short >> "$GITHUB_WORKSPACE/diagnostics/openwrt/git.txt" 2>&1

            cp -f .config "$GITHUB_WORKSPACE/diagnostics/openwrt/dot_config.txt" 2>/dev/null || true
            ./scripts/diffconfig.sh > "$GITHUB_WORKSPACE/diagnostics/openwrt/diffconfig.txt" 2>&1 || true

            cp -f feeds.conf.default "$GITHUB_WORKSPACE/diagnostics/openwrt/feeds.conf.default.txt" 2>/dev/null || true
            cp -f feeds.conf "$GITHUB_WORKSPACE/diagnostics/openwrt/feeds.conf.txt" 2>/dev/null || true

            cp -f tmp/.packageinfo "$GITHUB_WORKSPACE/diagnostics/openwrt/tmp/packageinfo.txt" 2>/dev/null || true
            cp -f tmp/.config-package.in "$GITHUB_WORKSPACE/diagnostics/openwrt/tmp/config-package.in.txt" 2>/dev/null || true
            cp -f tmp/.config-target.in "$GITHUB_WORKSPACE/diagnostics/openwrt/tmp/config-target.in.txt" 2>/dev/null || true

            {
              echo "===== grep diskman/rpcd/luci/openlist from .config ====="
              grep -E 'CONFIG_PACKAGE_(luci|rpcd|diskman|openlist|ttyd|argon|parted|lsblk|e2fsprogs|smartmontools)' .config || true
              echo
              echo "===== grep diskman/rpcd from tmp/.packageinfo ====="
              grep -nE 'Package: (luci-app-diskman|luci-i18n-diskman|rpcd-mod-file|luci-base)|Depends:|Source-Makefile:.*diskman' tmp/.packageinfo 2>/dev/null || true
            } > "$GITHUB_WORKSPACE/diagnostics/openwrt/package/important_package_grep.txt" 2>&1

            {
              echo "===== DiskMan package files ====="
              find package/luci-app-diskman -maxdepth 6 -type f | sort || true
              echo
              echo "===== DiskMan Makefile ====="
              sed -n '1,260p' package/luci-app-diskman/Makefile 2>/dev/null || true
            } > "$GITHUB_WORKSPACE/diagnostics/openwrt/package/diskman_tree_and_makefile.txt" 2>&1

            {
              echo "===== Output files ====="
              find bin/targets -type f -exec ls -lah {} \; 2>/dev/null | sort || true
              echo
              echo "===== Manifests ====="
              for f in $(find bin/targets -type f -name '*.manifest' 2>/dev/null | sort); do
                echo "----- $f -----"
                cat "$f"
              done
            } > "$GITHUB_WORKSPACE/diagnostics/openwrt/bin/outputs_and_manifests.txt" 2>&1

            mkdir -p "$GITHUB_WORKSPACE/diagnostics/openwrt/manifests"
            find bin/targets -type f -name '*.manifest' -exec cp -f {} "$GITHUB_WORKSPACE/diagnostics/openwrt/manifests/" \; 2>/dev/null || true

            {
              echo "===== build_dir failed stamps / logs ====="
              find build_dir -type f \
                \( -name '*.log' -o -name 'config.log' -o -name '.configured*' -o -name '.built*' -o -name '.pkgdir*' \) \
                2>/dev/null | sort | head -2000
            } > "$GITHUB_WORKSPACE/diagnostics/openwrt/build_dir_interesting_files.txt" 2>&1

            cd "$GITHUB_WORKSPACE"
          fi

          tar -czf OpenWrt_full_diagnostics_${{ github.run_number }}.tar.gz diagnostics logs release-files 2>/dev/null || true
          ls -lah OpenWrt_full_diagnostics_${{ github.run_number }}.tar.gz 2>/dev/null || true

      - name: Upload full diagnostics artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Full_Diagnostics_${{ github.run_number }}
          path: |
            OpenWrt_full_diagnostics_${{ github.run_number }}.tar.gz
            diagnostics/**
            logs/**
          if-no-files-found: warn
          retention-days: 30
          compression-level: 6

      - name: Upload firmware artifact
        if: ${{ always() && env.UPLOAD_FIRMWARE == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Firmware_${{ github.run_number }}
          path: release-files/**
          if-no-files-found: warn
          retention-days: 14
          compression-level: 6

      - name: Generate release tag
        if: ${{ success() && env.UPLOAD_RELEASE == 'true' }}
        run: |
          echo "RELEASE_TAG=OpenWrt_F50_WiFi_SFTP_ttyd_Argon_OpenList_FixedMinimalDiskManTest_$(date +'%Y%m%d_%H%M%S')" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        if: ${{ success() && env.UPLOAD_RELEASE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: |
            RAX3000M FixedMinimalDiskManTest build.

            Included:
            - F50 USB Ethernet drivers
            - WiFi
            - SFTP
            - ttyd
            - luci-theme-argon
            - OpenList
            - patched minimal DiskMan LuCI package
            - DiskMan Lua LuCI runtime dependencies
            - basic disk user tools only

            Notes:
            - Full diagnostics are uploaded as a workflow artifact.
            - Manifest package warnings no longer block artifact upload by default.
            - STRICT_MANIFEST_CHECK=false by default.

            Still removed for this test:
            - luci-app-argon-config
            - tempinfo / custom temperature LuCI JS
            - dark-line CSS patch
            - USB storage / UAS
            - block-mount
            - ext4 filesystem support
            - btrfs/exfat/f2fs/ntfs tools and kmods where not pulled by base profile
            - manual extroot scripts
            - OpenClash
            - Docker
            - Turbo ACC
          files: release-files/*
          draft: false
          prerelease: false
